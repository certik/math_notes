[workspace]
authors = ["Ondřej Čertík <ondrej@certik.us>"]
channels = ["conda-forge"]
description = "Math notes using mystmd"
name = "math_notes"
platforms = ["osx-arm64", "win-64"]
version = "0.1.0"

[tasks]
start = { cmd = "myst start", description = "Start the MyST development server with live preview" }
build = { cmd = "myst build", description = "Build the site with MyST" }
tex = { cmd = "myst build --tex && (cd _build/exports/paper_tex && tectonic paper.tex)", description = "Build the paper as LaTeX and compile it to PDF with tectonic" }
texdet = { cmd = "myst build --tex 02-determinant.md && (cd _build/exports/determinant_tex && tectonic determinant.tex)", description = "Build the determinant note as LaTeX and compile it to PDF with tectonic" }
typst = { cmd = "myst build --typst", description = "Build the site as Typst documents" }

[dependencies]
typst = ">=0.12.0,<0.13"
tectonic = ">=0.15.0,<0.16"
mystmd = ">=1.3.20,<2"
