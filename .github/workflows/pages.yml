name: Build and deploy site to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install wrangler (locked, integrity-verified)
        run: |
          npm ci --ignore-scripts
          npm audit signatures

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          pixi-version: v0.68.0
          cache: true

      - name: Build static HTML site
        run: pixi run html

      - name: Determine deploy branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ./node_modules/.bin/wrangler pages deploy _build/html \
            --project-name=math-notes \
            --branch="${{ steps.branch.outputs.name }}" \
            | tee deploy.log
          deployment_url=$(grep -Eo 'https://[a-z0-9-]+\.[a-z0-9-]+\.pages\.dev' deploy.log | head -n1)
          project_host=$(echo "$deployment_url" | sed -E 's|https://[a-z0-9-]+\.([a-z0-9-]+\.pages\.dev)|\1|')
          alias_url="https://${{ steps.branch.outputs.name }}.${project_host}"
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "alias-url=$alias_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          header: cloudflare-preview
          message: |
            🚀 **Cloudflare Pages preview deployed**

            - Preview URL: ${{ steps.deploy.outputs.deployment-url }}
            - Alias: ${{ steps.deploy.outputs.alias-url }}
            - Commit: `${{ github.event.pull_request.head.sha }}`
