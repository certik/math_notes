name: Build and deploy site to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.68.0
          cache: true

      - name: Build static HTML site
        run: pixi run -- myst build --html

      - name: Determine deploy branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@4.86.0 pages deploy _build/html \
            --project-name=math-notes \
            --branch="${{ steps.branch.outputs.name }}" \
            | tee deploy.log
          deployment_url=$(grep -Eo 'https://[a-z0-9-]+\.[a-z0-9-]+\.pages\.dev' deploy.log | head -n1)
          project_host=$(echo "$deployment_url" | sed -E 's|https://[a-z0-9-]+\.([a-z0-9-]+\.pages\.dev)|\1|')
          alias_url="https://${{ steps.branch.outputs.name }}.${project_host}"
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "alias-url=$alias_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-preview
          message: |
            🚀 **Cloudflare Pages preview deployed**

            - Preview URL: ${{ steps.deploy.outputs.deployment-url }}
            - Alias: ${{ steps.deploy.outputs.alias-url }}
            - Commit: `${{ github.event.pull_request.head.sha }}`
